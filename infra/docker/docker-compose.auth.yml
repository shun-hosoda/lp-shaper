# =============================================================
# common-auth-to-c 窶・隱崎ｨｼ蝓ｺ逶､ Compose 繧ｹ繝九・繝・ヨ・医ヵ繝ｭ繝ｳ繝亥性縺ｾ縺ｪ縺・ｼ・
# =============================================================
# 菴ｿ逕ｨ譁ｹ豕・
#   1. 縺薙・繝輔ぃ繧､繝ｫ繧定・繝励Ο繧ｸ繧ｧ繧ｯ繝医・ infra/docker/ 縺ｫ繧ｳ繝斐・
#   2. .env 繧剃ｽ懈・ (common-auth-to-c/.env.example 繧貞盾辣ｧ)
#   3. 閾ｪ繝励Ο繧ｸ繧ｧ繧ｯ繝医・ docker-compose.yml 縺ｫ include: 縺ｾ縺溘・ networks: 縺ｧ謗･邯・
# =============================================================

services:
  db:
    image: supabase/postgres:15.8.1.060
    healthcheck:
      test: pg_isready -U supabase_admin -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./volumes/db/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-900}

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "${KONG_HTTP_PORT:-8100}:8000"
      - "${KONG_HTTPS_PORT:-8443}:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./volumes/api/kong.yml:/home/kong/kong.yml:ro
    depends_on:
      - db

  auth:
    image: supabase/gotrue:v2.164.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3100}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8100}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-http://localhost:3100/auth/callback,http://localhost:3100/auth/confirm}
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-900}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_ADMIN_GROUP_NAME: service_role
      GOTRUE_MAILER_AUTOCONFIRM: false
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: true
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: true
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: 10
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-inbucket}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-2500}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-auth}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOTRUE_EXTERNAL_GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOTRUE_EXTERNAL_GOOGLE_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI:-http://localhost:8100/auth/v1/callback}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  inbucket:
    image: inbucket/inbucket:stable
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "2500:2500"

  db-migrate:
    image: postgres:15-alpine
    depends_on:
      auth:
        condition: service_healthy
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./volumes/db/migrations:/migrations:ro
    command: >
      psql
        -h db
        -U supabase_admin
        -d ${POSTGRES_DB:-postgres}
        -f /migrations/02_post_auth_setup.sql

volumes:
  db-data:

